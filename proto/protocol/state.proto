syntax = "proto3";

package ecliptix.proto.protocol;
option csharp_namespace = "Ecliptix.Protobuf.Protocol";

import "google/protobuf/timestamp.proto";

message ProtocolState {
  uint32 version = 1;
  bool is_initiator = 2;
  google.protobuf.Timestamp created_at = 3;
  bytes session_id = 4;
  uint64 state_counter = 5;
  uint64 send_ratchet_epoch = 6;
  uint64 recv_ratchet_epoch = 7;

  bytes root_key = 10;
  ChainState send_chain = 11;
  ChainState recv_chain = 12;

  DhKeyPair dh_local = 13;
  bytes dh_remote_public = 14;
  bytes dh_local_initial_public = 15;
  bytes dh_remote_initial_public = 16;

  bytes metadata_key = 17;

  KyberKeyPair kyber_local = 18;
  bytes kyber_remote_public = 19;

  NonceState nonce_generator = 20;
  bytes state_hmac = 21;
  uint32 max_messages_per_chain = 22;
  uint64 max_nonce_counter = 23;

  // Identity binding - cryptographically ties session to peer identities
  bytes local_identity_ed25519_public = 30;   // 32 bytes
  bytes local_identity_x25519_public = 31;    // 32 bytes
  bytes peer_identity_ed25519_public = 32;    // 32 bytes
  bytes peer_identity_x25519_public = 33;     // 32 bytes
  bytes identity_binding_hash = 34;           // 32 bytes, SHA256(sorted(local_x25519 || peer_x25519))

  // Replay protection state — persisted across session save/restore
  uint64 replay_epoch = 40;
  repeated bytes seen_payload_nonces = 41;

  // Direction-change ratcheting: when true, the next send forces a ratchet step
  bool send_ratchet_pending = 50;

  // Multi-epoch skipped message keys — persisted across session save/restore
  // Keys cached from old receive chains for out-of-order message delivery
  repeated CachedMessageKey skipped_keys = 52;

  // Cached metadata keys from old ratchet epochs — for out-of-order metadata decryption
  repeated CachedMetadataKey cached_metadata_keys = 55;

  // Send-side metadata key (rotates independently of recv-side metadata_key field 17)
  bytes send_metadata_key = 56;
}

message ChainState {
  uint64 message_index = 1;
  bytes chain_key = 2;
  repeated CachedMessageKey skipped_message_keys = 3;
}

message CachedMessageKey {
  uint64 message_index = 1;
  bytes message_key = 2;
  uint64 epoch = 3;
}

message DhKeyPair {
  bytes private_key = 1;
  bytes public_key = 2;
}

message KyberKeyPair {
  bytes secret_key = 1;
  bytes public_key = 2;
}

message CachedMetadataKey {
  uint64 epoch = 1;
  bytes metadata_key = 2;
}

message NonceState {
  bytes prefix = 1;
  uint64 counter = 2;
}
