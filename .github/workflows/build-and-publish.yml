name: Build & Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g., 1.0.1)'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build-apple-xcframework:
    name: Build XCFramework
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: brew install protobuf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - uses: Swatinem/rust-cache@v2

      - name: Build Rust FFI for all Apple targets
        run: |
          for target in aarch64-apple-darwin aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios; do
            cargo rustc --release --features ffi --target "$target" --crate-type staticlib
          done

      - name: Create fat simulator library
        run: |
          lipo -create \
            target/aarch64-apple-ios-sim/release/libecliptix_protocol.a \
            target/x86_64-apple-ios/release/libecliptix_protocol.a \
            -output target/libecliptix_protocol_sim.a

      - name: Create framework bundles with headers
        run: |
          create_framework() {
            local lib="$1" dst="$2"
            local fw="$dst/EcliptixProtocolC.framework"
            mkdir -p "$fw/Headers" "$fw/Modules"
            cp "$lib" "$fw/EcliptixProtocolC"
            cp include/*.h "$fw/Headers/"
            cp include/module.modulemap "$fw/Modules/"
          }
          create_framework target/aarch64-apple-darwin/release/libecliptix_protocol.a dist/frameworks/macos-arm64
          create_framework target/aarch64-apple-ios/release/libecliptix_protocol.a     dist/frameworks/ios-arm64
          create_framework target/libecliptix_protocol_sim.a                           dist/frameworks/ios-sim

      - name: Create XCFramework
        run: |
          mkdir -p dist/apple
          xcodebuild -create-xcframework \
            -framework dist/frameworks/macos-arm64/EcliptixProtocolC.framework \
            -framework dist/frameworks/ios-arm64/EcliptixProtocolC.framework \
            -framework dist/frameworks/ios-sim/EcliptixProtocolC.framework \
            -output dist/apple/ecliptix-protected-protocol.xcframework
          cd dist/apple && zip -r ecliptix-protected-protocol.xcframework.zip ecliptix-protected-protocol.xcframework
          shasum -a 256 ecliptix-protected-protocol.xcframework.zip > ecliptix-protected-protocol.xcframework.zip.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: apple-xcframework
          path: dist/apple/
          retention-days: 30

  publish-release:
    name: GitHub Release
    needs: [build-apple-xcframework]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "VERSION=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/apple-xcframework/ecliptix-protected-protocol.xcframework.zip
            artifacts/apple-xcframework/ecliptix-protected-protocol.xcframework.zip.sha256
          body: |
            ## Ecliptix Protected Protocol v${{ steps.version.outputs.VERSION }}

            ### Swift Package Manager
            ```swift
            .binaryTarget(
                name: "EcliptixProtectedProtocolBinary",
                url: "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ecliptix-protected-protocol.xcframework.zip",
                checksum: "$(cat artifacts/apple-xcframework/ecliptix-protected-protocol.xcframework.zip.sha256 | cut -d' ' -f1)"
            )
            ```

            ### Platforms
            - macOS arm64
            - iOS (arm64, simulator)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
